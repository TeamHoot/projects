html{scroll-behavior:smooth}

body{
  background:var(--black);
  color:var(--white);
  font-family:'Pretendard',sans-serif;
  overflow-x:hidden;
  cursor:none;
}

/* ── CUSTOM CURSOR ─────────────────────────────────────────── */
#cursor{
  position:fixed;width:12px;height:12px;background:var(--white);
  border-radius:50%;pointer-events:none;z-index:9999;
  transition:transform .15s ease,opacity .15s ease;
  mix-blend-mode:difference;
}
#cursor-ring{
  position:fixed;width:36px;height:36px;border:1px solid rgba(255,255,255,.4);
  border-radius:50%;pointer-events:none;z-index:9998;
  transition:transform .35s cubic-bezier(.23,1,.32,1);
}
body:hover #cursor{opacity:1}

/* ── NOISE OVERLAY ─────────────────────────────────────────── */
#noise{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  opacity:.028;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;
}

/* ── FIXED HEADER ──────────────────────────────────────────── */
header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:48px;background:rgba(8,8,8,.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--divider);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;
}
.hdr-left{display:flex;align-items:center;gap:16px}
.hdr-num{font-family:'Pretendard',sans-serif;font-size:16px;font-weight:800;letter-spacing:1px;color:var(--white)}
.hdr-sep{width:1px;height:16px;background:var(--gray2)}
.hdr-section{font-family:'Pretendard',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;color:var(--white)}
.hdr-sub{font-size:11px;color:var(--gray1);letter-spacing:.04em}
.hdr-brand{text-align:right;line-height:1.3}
.hdr-brand span{display:block;font-family:'Pretendard',sans-serif;font-size:12px;font-weight:800;letter-spacing:1px;color:var(--white)}

/* ── NAV DOTS ──────────────────────────────────────────────── */
#nav-dots{
  position:fixed;right:28px;top:50%;transform:translateY(-50%);
  z-index:100;display:flex;flex-direction:column;gap:14px;
}
.dot{
  width:6px;height:6px;border-radius:50%;background:var(--gray2);
  cursor:pointer;transition:all .3s ease;
}
.dot.active{background:var(--accent);transform:scale(1.5)}
.dot:hover{background:var(--white)}

/* ── SECTIONS ──────────────────────────────────────────────── */
section{
  min-height:100vh;position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:center;
  padding:80px 80px 60px;
}

/* ── 3D BLOB / ABSTRACT SHAPE ──────────────────────────────── */
.blob-wrap{
  position:absolute;right:-60px;top:50%;transform:translateY(-50%);
  width:52%;max-width:700px;pointer-events:none;z-index:0;
}
.blob-wrap svg{width:100%;height:auto;opacity:.85;filter:drop-shadow(0 0 60px rgba(0,0,0,.8))}

/* ── SECTION CONTENT ───────────────────────────────────────── */
.sec-content{position:relative;z-index:2;max-width:55%}

/* ── HERO ──────────────────────────────────────────────────── */
#hero{
  background: linear-gradient(160deg, #407bf3 0%, #3362c8 30%, #2a4580 60%, #1a2640 80%, #0f1520 100%);
  justify-content:flex-end;
  padding-bottom:80px;
  padding-top:48px;
  overflow:hidden;
}

/* Noise grain over gradient */
#hero::after{
  content:'';
  position:absolute;inset:0;z-index:0;
  pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;
  opacity:.035;
}

/* Vertical side text */
.hero-side-text{
  position:absolute;left:72px;bottom:10%;
  transform:rotate(-90deg);
  transform-origin:left bottom;
  font-size:11px;font-weight:500;letter-spacing:.35em;
  color:rgba(255,255,255,.35);text-transform:uppercase;
  white-space:nowrap;z-index:2;
}

/* Left divider line */
.hero-left-line{
  position:absolute;left:80px;top:10%;bottom:10%;
  width:1px;background:rgba(255,255,255,.15);z-index:2;
}

/* App icon top-right */
.hero-app-icon{
  position:absolute;top:60px;right:80px;z-index:2;
  width:160px;height:160px;
  border-radius:36px;
  display:flex;align-items:center;justify-content:center;
  animation:floatIcon 5s ease-in-out infinite;
}
@keyframes floatIcon{
  0%,100%{transform:translateY(0px)}
  50%{transform:translateY(-10px)}
}
.hero-app-icon-inner{
  width:110px;height:110px;position:relative;
}
/* HOOT owl circle mark */
.hero-icon-owl{
  width:100%;height:100%;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.owl-circle-dark{
  position:absolute;width:64px;height:64px;border-radius:50%;
  background:#1e2433;left:4px;top:14px;
}
.owl-circle-mid{
  position:absolute;width:48px;height:48px;border-radius:50%;
  background:rgba(180,200,240,.6);right:8px;top:8px;
}
.owl-circle-sm{
  position:absolute;width:24px;height:24px;border-radius:50%;
  background:rgba(255,255,255,.8);right:22px;top:10px;
}
.owl-letter{
  position:absolute;right:2px;bottom:8px;
  font-size:52px;font-weight:900;color:#1a2030;letter-spacing:-2px;
  font-family:'Pretendard',sans-serif;line-height:1;
}

.hero-content{
  position:relative;z-index:2;
  padding-left:120px;
  max-width:800px;
}

.hero-eyebrow{
  font-size:12px;font-weight:600;letter-spacing:.3em;
  color:rgba(255,255,255,.55);margin-bottom:28px;
  display:flex;align-items:center;gap:14px;
  text-transform:uppercase;
}
.hero-eyebrow::before{
  content:'';display:block;width:28px;height:1px;
  background:rgba(255,255,255,.4);flex-shrink:0;
}

.hero-title{
  font-family:'Pretendard',sans-serif;
  font-size:clamp(56px,7vw,110px);
  font-weight:900;
  line-height:1.0;letter-spacing:1px;
  color:var(--white);margin-bottom:32px;
}
.hero-title em{color:var(--white);font-style:normal;opacity:1}

/* Tag pill — matches the "UI / UX DESIGN • by teamhoot" pill in the image */
.hero-tags{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:0}
.hero-tag{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 20px;
  border:1.5px solid rgba(255,255,255,.4);
  border-radius:100px;
  font-size:12px;font-weight:700;letter-spacing:.08em;
  color:var(--white);text-transform:uppercase;
  backdrop-filter:blur(4px);
  background:rgba(255,255,255,.06);
}
.hero-tag-dot{
  width:14px;height:14px;border-radius:50%;
  background:linear-gradient(135deg,#407bf3,#1a2640);
  flex-shrink:0;border:1.5px solid rgba(255,255,255,.5);
}

.hero-scroll{
  position:absolute;bottom:32px;left:120px;
  display:flex;align-items:center;gap:12px;
  font-size:11px;letter-spacing:.2em;color:rgba(255,255,255,.35);text-transform:uppercase;
  z-index:2;
}
.scroll-line{width:48px;height:1px;background:rgba(255,255,255,.25);position:relative;overflow:hidden}
.scroll-line::after{
  content:'';position:absolute;left:-100%;top:0;width:100%;height:100%;
  background:rgba(255,255,255,.8);animation:scrollline 1.8s ease infinite;
}
@keyframes scrollline{0%{left:-100%}100%{left:100%}}

/* ── PAGE COUNTER ──────────────────────────────────────────── */
.page-counter{
  position:absolute;bottom:32px;right:80px;
  font-family:'Pretendard',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;color:var(--gray2);
}

/* ── SECTION HEADER ────────────────────────────────────────── */
.sec-label{
  display:flex;align-items:center;gap:12px;
  margin-bottom:40px;
}
.sec-num{font-family:'Pretendard',sans-serif;font-size:48px;font-weight:900;color:var(--divider);line-height:1;letter-spacing:1px}
.sec-title{
  font-family:'Pretendard',sans-serif;font-size:48px;font-weight:900;color:var(--white);line-height:1;
  letter-spacing:1px;
}
.sec-title-sub{font-size:12px;color:var(--gray1);letter-spacing:.12em;text-transform:uppercase;margin-left:2px}

/* ── INTRO / INTRO STATS ───────────────────────────────────── */
#intro{background:linear-gradient(160deg,#0a0a0a 0%,#0d0d0d 100%)}
.intro-body{font-size:15px;color:var(--gray1);line-height:1.85;max-width:520px;margin-bottom:48px;font-weight:300}
.intro-body strong{color:var(--white);font-weight:500}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--divider);border:1px solid var(--divider);max-width:520px;margin-bottom:44px}
.stat{background:var(--card);padding:24px 20px}
.stat-val{font-family:'Pretendard',sans-serif;font-weight:900;font-size:44px;color:var(--accent);line-height:1;letter-spacing:1px}
.stat-label{font-size:11px;color:var(--gray2);letter-spacing:.06em;margin-top:4px}

/* ── FEATURES GRID ─────────────────────────────────────────── */
#features{background:var(--dark)}
.features-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:1px;
  background:var(--divider);border:1px solid var(--divider);
  margin-top:44px;max-width:100%;
}
.feat-card{
  background:var(--card);padding:28px 22px;
  position:relative;overflow:hidden;
  transition:background .25s ease;
}
.feat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--feat-color,var(--accent));
  transform:scaleX(0);transform-origin:left;
  transition:transform .35s ease;
}
.feat-card:hover::before{transform:scaleX(1)}
.feat-card:hover{background:var(--card2)}
.feat-num{
  font-family:'Pretendard',sans-serif;font-size:11px;font-weight:700;letter-spacing:.15em;
  color:var(--gray2);margin-bottom:16px;
}
.feat-icon{font-size:24px;margin-bottom:14px;line-height:1}
.feat-title{font-size:14px;font-weight:700;color:var(--white);line-height:1.4;margin-bottom:10px;letter-spacing:1px}
.feat-desc{font-size:12px;color:var(--gray2);line-height:1.6}
.feat-tag{
  display:inline-block;margin-top:16px;font-size:10px;
  color:var(--feat-color,var(--accent));letter-spacing:.08em;
  border-top:1px solid var(--divider);padding-top:12px;width:100%;
}

/* ── PROJECT SLIDE ─────────────────────────────────────────── */
.project-sec{
  background:var(--black);
  padding-top:100px;
}
.project-sec:nth-child(even){background:var(--dark)}
.proj-hdr{
  display:flex;align-items:baseline;gap:16px;
  margin-bottom:10px;padding-bottom:12px;
  border-bottom:1px solid var(--divider);
}
.proj-hdr-num{font-family:'Pretendard',sans-serif;font-size:13px;font-weight:800;letter-spacing:1px;color:var(--white)}
.proj-hdr-sep{color:var(--gray2);font-size:14px}
.proj-hdr-cat{font-family:'Pretendard',sans-serif;font-size:13px;font-weight:800;letter-spacing:1px;color:var(--white)}
.proj-hdr-name{font-size:12px;color:var(--gray1);letter-spacing:.04em}
.proj-title{font-size:clamp(22px,2.5vw,32px);font-weight:700;color:var(--white);margin-bottom:16px;line-height:1.3;letter-spacing:1px}
.proj-title em{font-style:normal;color:var(--accent)}
.proj-body{font-size:13px;color:var(--gray1);line-height:1.8;margin-bottom:28px;max-width:480px;font-weight:300}
.skills-label{font-size:12px;font-weight:700;color:var(--white);margin-bottom:10px;letter-spacing:.04em}
.skills-divider{height:1px;background:var(--divider);margin-bottom:12px}
.skills-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}
.skill-pill{
  padding:6px 16px;border:1px solid var(--gray3);
  font-size:11px;font-weight:700;color:var(--white);letter-spacing:.06em;
  transition:all .2s ease;
}
.skill-pill:hover{border-color:var(--accent);color:var(--accent)}
.link-section{margin-bottom:20px}
.link-label{font-size:12px;font-weight:700;color:var(--white);margin-bottom:6px;letter-spacing:.04em}
.link-divider{height:1px;background:var(--divider);margin-bottom:8px}
.link-url{font-size:11px;color:#6699ff;text-decoration:none;transition:color .2s}
.link-url:hover{color:var(--white)}

/* ── PARALLAX IMG PANEL ────────────────────────────────────── */
.proj-right{
  position:absolute;right:0;top:0;bottom:0;width:46%;
  overflow:hidden;
}
.proj-img-stack{
  position:relative;height:100%;display:flex;
  align-items:center;justify-content:center;gap:16px;padding:80px 40px 60px;
}
.phone-card{
  background:var(--card2);border:1px solid var(--divider);
  border-radius:16px;overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,.6);
  flex-shrink:0;
  transition:transform .4s ease;
}
.phone-card:hover{transform:translateY(-8px)}
.phone-card img{width:100%;display:block}
.phone-placeholder{
  width:200px;min-height:380px;
  background:linear-gradient(160deg,var(--card) 0%,var(--card2) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:24px;
}
.phone-placeholder .ph-icon{font-size:32px;opacity:.3}
.phone-placeholder .ph-label{font-size:11px;color:var(--gray2);text-align:center;letter-spacing:.06em}

/* ── TECH STACK ────────────────────────────────────────────── */
#tech{background:var(--dark)}
.tech-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--divider);border:1px solid var(--divider);margin-top:44px}
.tech-item{
  background:var(--card);padding:32px 20px;text-align:center;
  transition:background .25s;
}
.tech-item:hover{background:var(--card2)}
.tech-icon{font-size:28px;margin-bottom:12px}
.tech-name{font-size:13px;font-weight:700;color:var(--white);margin-bottom:4px;letter-spacing:1px}
.tech-cat{font-size:10px;color:var(--gray2);letter-spacing:.08em;text-transform:uppercase}

/* ── PROCESS ───────────────────────────────────────────────── */
#process{background:var(--black)}
.process-flow{
  display:grid;grid-template-columns:repeat(5,1fr);gap:0;
  margin-top:48px;position:relative;
}
.process-flow::before{
  content:'';position:absolute;top:40px;left:10%;right:10%;
  height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);
  z-index:0;
}
.proc-step{
  position:relative;z-index:1;text-align:center;padding:0 16px;
}
.proc-circle{
  width:80px;height:80px;border-radius:50%;
  background:var(--card2);border:1px solid var(--divider);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;font-size:22px;
  transition:all .3s ease;
}
.proc-step:hover .proc-circle{
  border-color:var(--accent);background:rgba(64,123,243,.10);
  transform:scale(1.08);
}
.proc-step.highlight .proc-circle{
  background:var(--accent);border-color:var(--accent);
}
.proc-step.highlight .proc-circle span{filter:invert(1)}
.proc-num{font-family:'Pretendard',sans-serif;font-size:10px;font-weight:700;letter-spacing:.15em;color:var(--gray2);margin-bottom:8px}
.proc-title{font-size:13px;font-weight:700;color:var(--white);margin-bottom:6px;letter-spacing:1px}
.proc-desc{font-size:11px;color:var(--gray2);line-height:1.6}

/* ── POSITIONING / OUTRO ───────────────────────────────────── */
#outro{
  background:var(--black);
  min-height:100vh;
  flex-direction:column;
  justify-content:center;
  align-items:flex-start;
}
.outro-title{
  font-family:'Pretendard',sans-serif;
  font-size:clamp(52px,7vw,110px);
  font-weight:900;
  line-height:.95;letter-spacing:1px;
  color:var(--white);margin-bottom:32px;
  max-width:800px;
}
.outro-title em{color:var(--accent);font-style:normal}
.outro-body{font-size:15px;color:var(--gray1);line-height:1.8;max-width:520px;margin-bottom:48px;font-weight:300}
.outro-divider{width:100%;height:1px;background:var(--divider);margin:48px 0}
.outro-footer{
  display:flex;justify-content:space-between;align-items:flex-end;
  width:100%;
}
.outro-team{font-size:11px;font-weight:600;color:var(--gray2);letter-spacing:.1em;text-transform:uppercase}
.outro-copy{font-size:11px;color:var(--gray2);letter-spacing:.06em}

/* ── SCROLL REVEAL ─────────────────────────────────────────── */
.reveal{opacity:0;transform:translateY(32px);transition:opacity .7s ease,transform .7s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-delay-1{transition-delay:.1s}
.reveal-delay-2{transition-delay:.2s}
.reveal-delay-3{transition-delay:.3s}
.reveal-delay-4{transition-delay:.4s}

/* ── PARALLAX BLOB ANIMATION ───────────────────────────────── */
@keyframes floatBlob{
  0%,100%{transform:translateY(-50%) rotate(0deg)}
  50%{transform:translateY(-53%) rotate(3deg)}
}
.blob-wrap{animation:floatBlob 8s ease-in-out infinite}

/* ── PROGRESS BAR ──────────────────────────────────────────── */
#progress{
  position:fixed;top:48px;left:0;height:2px;
  background:var(--accent);z-index:99;
  transition:width .1s linear;width:0%;
}

/* ── SCROLLBAR ─────────────────────────────────────────────── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--black)}
::-webkit-scrollbar-thumb{background:var(--gray3)}
::-webkit-scrollbar-thumb:hover{background:var(--gray2)}

/* ── RESPONSIVE ────────────────────────────────────────────── */
@media(max-width:960px){
  section{padding:80px 32px 60px}
  .sec-content{max-width:100%}
  .blob-wrap{opacity:.2;width:80%}
  .proj-right{display:none}
  .features-grid{grid-template-columns:repeat(2,1fr)}
  .tech-grid{grid-template-columns:repeat(3,1fr)}
  .process-flow{grid-template-columns:1fr;gap:24px}
  .process-flow::before{display:none}
  header{padding:0 24px}
  .hdr-sub{display:none}
  .hero-scroll{left:32px}
  .page-counter{right:32px}
  #nav-dots{display:none}
}

/* ── SWIPER PROJECTS ───────────────────────────────────────── */
#projects-swiper{
  background:var(--dark);
  padding:80px 0 80px;
  min-height:auto;
  overflow:hidden;
  display:block;
  position:relative;
}
.swiper-section-header{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:0 80px;margin-bottom:44px;
}
.swiper-section-header .sec-label{margin-bottom:0}
.swiper-nav-btns{display:flex;gap:10px;align-items:center}
.swiper-btn{
  width:44px;height:44px;border:1px solid var(--gray3);background:transparent;
  color:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:all .2s ease;flex-shrink:0;
}
.swiper-btn:hover{border-color:var(--accent);color:var(--accent)}
.swiper-btn:disabled{opacity:.3;cursor:default}

.swiper-track-wrap{
  position:relative;padding:0 80px;
  /* drag cursor */
}
.swiper-track-wrap.dragging{cursor:grabbing}
.swiper-track{
  display:flex;gap:20px;
  transition:transform .5s cubic-bezier(.4,0,.2,1);
  will-change:transform;
  user-select:none;
}

/* Project cards */
.proj-sw-card{
  flex-shrink:0;
  width:300px;
  background:var(--card);
  border:1px solid var(--divider);
  position:relative;overflow:hidden;
  cursor:pointer;
  transition:transform .3s ease, border-color .3s ease;
  text-decoration:none;color:inherit;
  display:block;
}
.proj-sw-card:hover{
  transform:translateY(-6px);
  border-color:var(--gray2);
}
.proj-sw-card:hover .proj-sw-overlay{opacity:1}
.proj-sw-card:hover .proj-sw-arrow{transform:translate(0,0);opacity:1}

/* Top accent color bar */
.proj-sw-bar{height:3px;width:100%}

/* Logo area */
.proj-sw-logo{
  height:140px;display:flex;align-items:center;justify-content:center;
  border-bottom:1px solid var(--divider);
  position:relative;overflow:hidden;
  background:var(--card2);
}
.proj-sw-logo-inner{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;z-index:1;position:relative;
}
.proj-sw-logo-mark{
  font-size:36px;font-weight:900;line-height:1;
  letter-spacing:-.03em;
}
.proj-sw-logo-sub{font-size:10px;letter-spacing:.15em;color:var(--gray2);text-transform:uppercase}
.proj-sw-logo-bg{
  position:absolute;inset:0;opacity:.04;
  font-size:80px;font-weight:900;color:var(--white);
  display:flex;align-items:center;justify-content:center;
  letter-spacing:-.05em;pointer-events:none;
}

/* Card body */
.proj-sw-body{padding:20px}
.proj-sw-num{font-size:10px;font-weight:700;letter-spacing:.18em;color:var(--gray2);margin-bottom:10px}
.proj-sw-name{font-size:16px;font-weight:800;color:var(--white);margin-bottom:6px;line-height:1.3;letter-spacing:1px}
.proj-sw-desc{font-size:12px;color:var(--gray2);line-height:1.6;margin-bottom:16px}
.proj-sw-tags{display:flex;flex-wrap:wrap;gap:6px}
.proj-sw-tag{
  font-size:10px;font-weight:600;letter-spacing:.06em;
  padding:3px 9px;border:1px solid var(--divider);color:var(--gray2);
}

/* Hover overlay */
.proj-sw-overlay{
  position:absolute;inset:0;
  background:rgba(64,123,243,.06);
  opacity:0;transition:opacity .3s ease;
  pointer-events:none;
}
.proj-sw-arrow{
  position:absolute;top:16px;right:16px;
  font-size:16px;color:var(--accent);
  transform:translate(4px,-4px);opacity:0;
  transition:all .3s ease;
}

/* Swiper pagination */
.swiper-pagination{
  display:flex;gap:6px;justify-content:center;
  padding:28px 80px 0;
}
/* ── CEO SECTION ───────────────────────────────────────────── */
#ceo{
  background:var(--dark);
  min-height:100vh;
  padding:80px 80px 60px;
  display:flex;flex-direction:column;justify-content:center;
  position:relative;overflow:hidden;
}
.ceo-layout{
  display:grid;
  grid-template-columns:320px 1fr 1fr;
  gap:0;
  position:relative;z-index:2;
  height:calc(100vh - 160px);
  max-height:820px;
}

/* Left — photo + name */
.ceo-left{
  padding-right:48px;
  display:flex;flex-direction:column;justify-content:flex-end;
  border-right:1px solid var(--divider);
  padding-bottom:0;
}
.ceo-photo-wrap{
  flex:1;
  position:relative;overflow:hidden;
  margin-bottom:24px;
  background:var(--card2);
}
.ceo-photo-placeholder{
  width:100%;height:100%;
  background:linear-gradient(160deg,#1a1a2e 0%,#0d0d1a 100%);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.ceo-photo-letter{
  font-size:120px;font-weight:900;color:rgba(64,123,243,.15);
  letter-spacing:-4px;line-height:1;
  font-family:'Pretendard',sans-serif;
}
.ceo-photo-watermark{
  position:absolute;inset:0;
  display:flex;flex-wrap:wrap;align-content:center;justify-content:center;
  gap:0;opacity:.06;pointer-events:none;
}
.ceo-photo-watermark span{
  font-size:13px;font-weight:700;color:var(--white);
  letter-spacing:.12em;padding:4px 8px;white-space:nowrap;
}
.ceo-name-block{padding-bottom:4px}
.ceo-name{font-size:18px;font-weight:800;color:var(--white);letter-spacing:1px;margin-bottom:6px}
.ceo-role{font-size:11px;color:var(--gray2);letter-spacing:.12em;text-transform:uppercase;margin-bottom:16px}
.ceo-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:0}
.ceo-tag{
  font-size:10px;font-weight:600;color:var(--gray1);
  padding:4px 10px;border:1px solid var(--divider);letter-spacing:.06em;
}

/* Middle — Education + Projects */
.ceo-mid{
  padding:0 40px;
  border-right:1px solid var(--divider);
  overflow-y:auto;
  display:flex;flex-direction:column;gap:0;
}
.ceo-mid::-webkit-scrollbar{width:3px}
.ceo-mid::-webkit-scrollbar-thumb{background:var(--gray3)}

.ceo-block{margin-bottom:32px}
.ceo-block-title{
  font-size:14px;font-weight:800;color:var(--white);
  letter-spacing:1px;margin-bottom:10px;padding-bottom:10px;
  border-bottom:1px solid var(--divider);
}
.ceo-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.ceo-list li{
  font-size:12px;color:var(--gray1);line-height:1.6;
  padding-left:14px;position:relative;
}
.ceo-list li::before{
  content:'·';position:absolute;left:0;color:var(--accent);font-size:16px;line-height:1.3;
}
.ceo-list li strong{color:var(--white);font-weight:600}

/* Right — Quote + Philosophy */
.ceo-right{
  padding:0 0 0 40px;
  display:flex;flex-direction:column;justify-content:center;
  gap:28px;
}
.ceo-quote{
  padding:28px 28px;
  border:1px solid var(--divider);
  background:var(--card);
  position:relative;
}
.ceo-quote::before{
  content:'"';
  position:absolute;top:-18px;left:20px;
  font-size:64px;font-weight:900;color:var(--accent);
  font-family:'Pretendard',sans-serif;line-height:1;
}
.ceo-quote-text{
  font-size:17px;font-weight:700;color:var(--white);
  letter-spacing:1px;line-height:1.4;margin-bottom:16px;
}
.ceo-quote-body{font-size:12px;color:var(--gray1);line-height:1.8;font-weight:300}

.ceo-philosophy{display:flex;flex-direction:column;gap:14px}
.ceo-phil-item{
  padding:18px 20px;
  border-left:2px solid var(--accent);
  background:var(--card);
}
.ceo-phil-title{
  font-size:12px;font-weight:800;color:var(--white);
  letter-spacing:1px;margin-bottom:6px;
}
.ceo-phil-body{font-size:11.5px;color:var(--gray2);line-height:1.7}

@media(max-width:960px){
  .ceo-layout{grid-template-columns:1fr;height:auto}
  .ceo-left{border-right:none;border-bottom:1px solid var(--divider);padding:0 0 24px;margin-bottom:24px}
  .ceo-photo-wrap{height:200px}
  .ceo-mid{border-right:none;padding:0 0 24px;border-bottom:1px solid var(--divider);margin-bottom:24px}
  .ceo-right{padding:0}
}

</head>

<script>
// ── CURSOR ──────────────────────────────────────────────────
const cur = document.getElementById('cursor');
const curRing = document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{
  mx=e.clientX; my=e.clientY;
  cur.style.left=mx-6+'px'; cur.style.top=my-6+'px';
});
(function animRing(){
  rx+=(mx-rx)*.12; ry+=(my-ry)*.12;
  curRing.style.left=rx-18+'px'; curRing.style.top=ry-18+'px';
  requestAnimationFrame(animRing);
})();
document.querySelectorAll('a,button,.dot,.feat-card,.proc-step').forEach(el=>{
  el.addEventListener('mouseenter',()=>{
    cur.style.transform='scale(2.5)';
    curRing.style.transform='scale(1.5)';
  });
  el.addEventListener('mouseleave',()=>{
    cur.style.transform='scale(1)';
    curRing.style.transform='scale(1)';
  });
});

// ── SCROLL REVEAL ────────────────────────────────────────────
const revealEls = document.querySelectorAll('.reveal');
const io = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting) e.target.classList.add('visible');
  });
},{threshold:.12});
revealEls.forEach(el=>io.observe(el));

// ── PROGRESS BAR ─────────────────────────────────────────────
const prog = document.getElementById('progress');
window.addEventListener('scroll',()=>{
  const pct = window.scrollY/(document.body.scrollHeight-window.innerHeight)*100;
  prog.style.width=pct+'%';
});

// ── NAV DOTS + HEADER UPDATE ──────────────────────────────────
const sections = document.querySelectorAll('section[id], div[id][data-section]');
const dots = document.querySelectorAll('.dot');
const hdrNum = document.getElementById('hdr-num');
const hdrSec = document.getElementById('hdr-section');
const hdrSub = document.getElementById('hdr-sub');

const sectionObs = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      const id = e.target.id;
      dots.forEach((d,i)=>{
        d.classList.remove('active');
        if(d.dataset.target===id) d.classList.add('active');
      });
      hdrNum.textContent  = e.target.dataset.num  || '01';
      hdrSec.textContent  = e.target.dataset.section || '';
      hdrSub.textContent  = e.target.dataset.sub  || '';
    }
  });
},{threshold:.35});
sections.forEach(s=>sectionObs.observe(s));

dots.forEach(dot=>{
  dot.addEventListener('click',()=>{
    document.getElementById(dot.dataset.target)?.scrollIntoView({behavior:'smooth'});
  });
});

// ── SWIPER ────────────────────────────────────────────────────
(function(){
  const track    = document.getElementById('sw-track');
  const wrap     = document.getElementById('sw-wrap');
  const btnPrev  = document.getElementById('sw-prev');
  const btnNext  = document.getElementById('sw-next');
  const pagEl    = document.getElementById('sw-pagination');
  const cards    = track.querySelectorAll('.proj-sw-card');

  const CARD_W   = 300;
  const GAP      = 20;
  const STEP     = CARD_W + GAP;
  let   cur      = 0;
  let   maxIdx   = 0;

  function getVisible(){
    const ww = window.innerWidth;
    if(ww >= 1400) return 4;
    if(ww >= 1100) return 3;
    if(ww >= 760)  return 2;
    return 1;
  }

  function updateMax(){
    maxIdx = Math.max(0, cards.length - getVisible());
  }

  function goTo(idx){
    updateMax();
    cur = Math.max(0, Math.min(idx, maxIdx));
    track.style.transform = `translateX(-${cur * STEP}px)`;
    btnPrev.disabled = cur === 0;
    btnNext.disabled = cur >= maxIdx;
    // update pagination dots
    pagEl.querySelectorAll('.swiper-page-dot').forEach((d,i)=>{
      d.classList.toggle('active', i === cur);
    });
  }

  // Build pagination
  function buildPagination(){
    updateMax();
    pagEl.innerHTML = '';
    for(let i = 0; i <= maxIdx; i++){
      const d = document.createElement('div');
      d.className = 'swiper-page-dot' + (i===0?' active':'');
      d.addEventListener('click', ()=> goTo(i));
      pagEl.appendChild(d);
    }
  }

  btnPrev.addEventListener('click', ()=> goTo(cur - 1));
  btnNext.addEventListener('click', ()=> goTo(cur + 1));

  // Keyboard
  document.addEventListener('keydown', e=>{
    const sw = document.getElementById('projects-swiper');
    const rect = sw.getBoundingClientRect();
    if(rect.top < window.innerHeight && rect.bottom > 0){
      if(e.key === 'ArrowLeft') goTo(cur - 1);
      if(e.key === 'ArrowRight') goTo(cur + 1);
    }
  });

  // Touch / drag
  let startX = 0, dragX = 0, isDragging = false;
  wrap.addEventListener('mousedown', e=>{ startX = e.clientX; isDragging = true; wrap.classList.add('dragging'); });
  document.addEventListener('mousemove', e=>{ if(!isDragging) return; dragX = e.clientX - startX; });
  document.addEventListener('mouseup', ()=>{
    if(!isDragging) return;
    isDragging = false; wrap.classList.remove('dragging');
    if(Math.abs(dragX) > 60) goTo(dragX < 0 ? cur+1 : cur-1);
    dragX = 0;
  });
  wrap.addEventListener('touchstart', e=>{ startX = e.touches[0].clientX; }, {passive:true});
  wrap.addEventListener('touchend', e=>{
    const diff = e.changedTouches[0].clientX - startX;
    if(Math.abs(diff) > 50) goTo(diff < 0 ? cur+1 : cur-1);
  });

  window.addEventListener('resize', ()=>{ buildPagination(); goTo(Math.min(cur, maxIdx)); });

  buildPagination();
  goTo(0);

  // Project card click → scroll to #project section + highlight
  cards.forEach(card=>{
    card.addEventListener('click', e=>{
      e.preventDefault();
      document.getElementById('project')?.scrollIntoView({behavior:'smooth'});
    });
  });
})();

window.addEventListener('scroll',()=>{
  const sy = window.scrollY;
  document.querySelectorAll('.blob-wrap').forEach((b,i)=>{
    const speed = .08 + i*.02;
    b.style.transform=`translateY(calc(-50% + ${sy*speed}px))`;
  });
});
</script>
